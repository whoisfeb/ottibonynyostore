<!DOCTYPE html>
<html>
<head>
  <link href="https://fonts.googleapis.com" rel="stylesheet">
  <style>
    body { font-family: 'Poppins', sans-serif; background: #0b0e14; color: #fff; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
    .card { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px); padding: 40px; border-radius: 24px; border: 1px solid rgba(0, 210, 255, 0.3); width: 100%; max-width: 450px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
    h2 { font-family: 'Orbitron'; text-align: center; color: #00d2ff; letter-spacing: 2px; }
    label { font-size: 11px; color: #00d2ff; font-weight: bold; display: block; margin-top: 15px; }
    input, textarea, select { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.3); color: #fff; box-sizing: border-box; }
    button { width: 100%; padding: 15px; background: linear-gradient(90deg, #00d2ff, #9d50bb); border: none; color: white; font-weight: bold; border-radius: 12px; cursor: pointer; margin-top: 20px; transition: 0.3s; }
    button:hover { transform: scale(1.02); box-shadow: 0 0 20px rgba(0, 210, 255, 0.5); }
    #status { text-align: center; margin-top: 15px; color: #00ffcc; font-size: 13px; }
  </style>
</head>
<body>
  <div class="card">
    <h2>ADMIN PANEL</h2>
    <label>NAMA MOD</label><input type="text" id="nama">
    <label>DESKRIPSI</label><textarea id="desc" rows="2"></textarea>
    <label>PLATFORM</label>
    <select id="platform">
      <option value="PC">🖥️ PC</option>
      <option value="Android">📱 Android</option>
      <option value="PC-Android">PC & Android</option>
    </select>
    <label>PREVIEW (YT/IMAGE LINK)</label><input type="text" id="preview">
    <label>FILE MOD</label><input type="file" id="file">
    <button onclick="proses()">🚀 PUBLISH MOD</button>
    <div id="status"></div>
  </div>
  <script>
    function proses() {
      const f = document.getElementById('file').files[0];
      if(!f) return alert("Pilih file!");
      const r = new FileReader();
      r.onload = function(e) {
        const obj = {
          namaMod: document.getElementById('nama').value,
          deskripsi: document.getElementById('desc').value || "-",
          platform: document.getElementById('platform').value,
          linkPreview: document.getElementById('preview').value,
          fileMod: { contents: Array.from(new Uint8Array(e.target.result)), name: f.name, mimeType: f.mimeType }
        };
        document.getElementById('status').innerText = "Uploading... ⏳";
        google.script.run.withSuccessHandler(msg => {
          document.getElementById('status').innerText = msg;
          document.querySelectorAll('input, textarea').forEach(el => el.value = "");
        }).uploadFile(obj);
      };
      r.readAsArrayBuffer(f);
    }
  </script>
</body>
</html>
